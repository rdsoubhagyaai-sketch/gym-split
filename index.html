<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Gym Split</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --text2: #777;
    --text3: #444;
    --accent: #c8f060;
    --strength-color: #60a5fa;
    --hyp-color: #86efac;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    padding: 48px 18px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .header-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .app-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .app-date { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .today-chip { font-size: 11px; font-weight: 600; color: var(--accent); background: rgba(200,240,96,0.1); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }

  .switcher {
    display: flex; gap: 6px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding: 0 18px 14px;
    margin: 0 -18px;
  }
  .switcher::-webkit-scrollbar { display: none; }
  .day-btn {
    scroll-snap-align: start; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 9px 14px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text2);
    font-size: 12px; font-weight: 600; cursor: pointer;
    min-width: 52px; letter-spacing: 0.03em;
  }
  .day-btn .dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
  .day-btn.today .dot { background: var(--accent); }
  .day-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .day-btn.active .dot { background: var(--bg); }
  .day-btn.rest-day { opacity: 0.38; }

  .content { padding: 18px 16px 100px; }

  .session-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .session-name { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
  .type-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; }
  .b-strength { background: rgba(96,165,250,0.12); color: var(--strength-color); }
  .b-hyp { background: rgba(134,239,172,0.12); color: var(--hyp-color); }
  .ex-count { font-size: 12px; color: var(--text3); margin-bottom: 16px; }

  .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .card:active { opacity: 0.85; }

  .img-wrap { width: 100%; aspect-ratio: 16/9; background: var(--surface2); position: relative; overflow: hidden; }
  .img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    opacity: 0; transition: opacity 0.35s; position: absolute; top: 0; left: 0; z-index: 1;
  }
  .img-wrap img.show { opacity: 1; }
  .placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px; z-index: 0;
  }
  .placeholder svg { opacity: 0.15; }
  .placeholder span { font-size: 10px; color: var(--text3); }

  .card-body { padding: 10px 11px 12px; }
  .card-name { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 7px; }
  .card-foot { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .card-sets { font-size: 11px; color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
  .card-muscle { font-size: 10px; color: var(--text3); background: var(--surface2); padding: 2px 7px; border-radius: 20px; white-space: nowrap; }

  .rest-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 65vh; text-align: center; gap: 10px; padding: 2rem;
  }
  .rest-icon { font-size: 48px; margin-bottom: 6px; }
  .rest-title { font-size: 22px; font-weight: 700; }
  .rest-sub { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 270px; }
  .rest-note { margin-top: 14px; font-size: 12px; color: var(--text3); border: 0.5px solid var(--border); padding: 10px 16px; border-radius: var(--radius-sm); max-width: 290px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="app-title">My Gym Split</div>
      <div class="app-date" id="date-lbl"></div>
    </div>
    <div class="today-chip" id="today-chip"></div>
  </div>
  <div class="switcher" id="switcher"></div>
</div>

<div class="content" id="content"></div>

<script>
const BASE = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

const SPLIT = {
  MON: {
    label: 'Upper — Strength', type: 'strength',
    exercises: [
      { name: 'Barbell Bench Press',        sets: '4 × 4–6',        muscle: 'Chest',      imgs: ['Barbell_Bench_Press_-_Medium_Grip/0.jpg','Barbell_Bench_Press_-_Medium_Grip/1.jpg'] },
      { name: 'Weighted Pull-ups / BB Row', sets: '4 × 4–6',        muscle: 'Back',       imgs: ['Pullups/0.jpg','Pullups/1.jpg'] },
      { name: 'Overhead Press',             sets: '3 × 5–7',        muscle: 'Shoulders',  imgs: ['Barbell_Shoulder_Press/0.jpg','Barbell_Shoulder_Press/1.jpg'] },
      { name: 'Dips',                       sets: '3 × 6–8',        muscle: 'Triceps',    imgs: ['Dips_-_Triceps_Version/0.jpg','Dips_-_Triceps_Version/1.jpg'] },
      { name: 'Chin-ups',                   sets: '3 × 6–8',        muscle: 'Biceps',     imgs: ['Chin-Up/0.jpg','Chin-Up/1.jpg'] },
      { name: 'Face Pulls',                 sets: '3 × 10–12',      muscle: 'Rear Delts', imgs: ['Face_Pull/0.jpg','Face_Pull/1.jpg'] },
    ]
  },
  TUE: {
    label: 'Lower — Strength', type: 'strength',
    exercises: [
      { name: 'Barbell Squat',              sets: '4 × 4–6',        muscle: 'Quads',      imgs: ['Barbell_Full_Squat/0.jpg','Barbell_Full_Squat/1.jpg'] },
      { name: 'Romanian Deadlift',          sets: '4 × 5–7',        muscle: 'Hamstrings', imgs: ['Romanian_Deadlift/0.jpg','Romanian_Deadlift/1.jpg'] },
      { name: 'Leg Press',                  sets: '3 × 6–8',        muscle: 'Quads',      imgs: ['Leg_Press/0.jpg','Leg_Press/1.jpg'] },
      { name: 'Standing Calf Raise',        sets: '4 × 8–10',       muscle: 'Calves',     imgs: ['Calf_Press_On_The_Leg_Press_Machine/0.jpg','Calf_Press_On_The_Leg_Press_Machine/1.jpg'] },
      { name: 'Plank',                      sets: '3 × 45–60 sec',  muscle: 'Core',       imgs: ['Plank/0.jpg','Plank/1.jpg'] },
    ]
  },
  WED: null,
  THU: {
    label: 'Push — Hypertrophy', type: 'hypertrophy',
    exercises: [
      { name: 'Incline Dumbbell Press',     sets: '4 × 8–10',       muscle: 'Chest',      imgs: ['Incline_Dumbbell_Press/0.jpg','Incline_Dumbbell_Press/1.jpg'] },
      { name: 'Machine Bench / Flat DB',    sets: '3 × 10–12',      muscle: 'Chest',      imgs: ['Barbell_Bench_Press_-_Medium_Grip/0.jpg','Barbell_Bench_Press_-_Medium_Grip/1.jpg'] },
      { name: 'Lateral Raise',              sets: '4 × 12–15',      muscle: 'Shoulders',  imgs: ['Seated_Side_Lateral_Raise/0.jpg','Seated_Side_Lateral_Raise/1.jpg'] },
      { name: 'Overhead Triceps Extension', sets: '3 × 10–12',      muscle: 'Triceps',    imgs: ['Cable_Rope_Overhead_Triceps_Extension/0.jpg','Cable_Rope_Overhead_Triceps_Extension/1.jpg'] },
      { name: 'Triceps Pushdown',           sets: '3 × 12–15',      muscle: 'Triceps',    imgs: ['Triceps_Pushdown/0.jpg','Triceps_Pushdown/1.jpg'] },
      { name: 'Pec Fly',                    sets: '3 × 12–15',      muscle: 'Chest',      imgs: ['Cable_Crossover/0.jpg','Cable_Crossover/1.jpg'] },
    ]
  },
  FRI: {
    label: 'Pull — Hypertrophy', type: 'hypertrophy',
    exercises: [
      { name: 'Lat Pulldown',               sets: '4 × 10–12',      muscle: 'Back',       imgs: ['Close-Grip_Front_Lat_Pulldown/0.jpg','Close-Grip_Front_Lat_Pulldown/1.jpg'] },
      { name: 'Barbell / DB Row',           sets: '4 × 8–10',       muscle: 'Back',       imgs: ['Bent_Over_Barbell_Row/0.jpg','Bent_Over_Barbell_Row/1.jpg'] },
      { name: 'Seated Cable Row',           sets: '3 × 10–12',      muscle: 'Back',       imgs: ['Seated_Cable_Rows/0.jpg','Seated_Cable_Rows/1.jpg'] },
      { name: 'Face Pulls',                 sets: '3 × 15–20',      muscle: 'Rear Delts', imgs: ['Face_Pull/0.jpg','Face_Pull/1.jpg'] },
      { name: 'Barbell Curl',               sets: '4 × 10–12',      muscle: 'Biceps',     imgs: ['Barbell_Curl/0.jpg','Barbell_Curl/1.jpg'] },
      { name: 'Hammer Curl',                sets: '3 × 12–15',      muscle: 'Biceps',     imgs: ['Alternate_Hammer_Curl/0.jpg','Alternate_Hammer_Curl/1.jpg'] },
      { name: 'Reverse Fly',                sets: '3 × 15–20',      muscle: 'Rear Delts', imgs: ['Reverse_Flyes/0.jpg','Reverse_Flyes/1.jpg'] },
    ]
  },
  SAT: {
    label: 'Legs — Hypertrophy', type: 'hypertrophy',
    exercises: [
      { name: 'Front Squat / Goblet Squat', sets: '4 × 8–10',       muscle: 'Quads',      imgs: ['Goblet_Squat/0.jpg','Goblet_Squat/1.jpg'] },
      { name: 'Leg Curl',                   sets: '4 × 10–12',      muscle: 'Hamstrings', imgs: ['Lying_Leg_Curls/0.jpg','Lying_Leg_Curls/1.jpg'] },
      { name: 'Leg Extension',              sets: '3 × 12–15',      muscle: 'Quads',      imgs: ['Leg_Extensions/0.jpg','Leg_Extensions/1.jpg'] },
      { name: 'Hip Thrust / Glute Bridge',  sets: '4 × 10–12',      muscle: 'Glutes',     imgs: ['Barbell_Hip_Thrust/0.jpg','Barbell_Hip_Thrust/1.jpg'] },
      { name: 'Walking Lunge',              sets: '3 × 12–16 steps', muscle: 'Quads',     imgs: ['Bodyweight_Walking_Lunge/0.jpg','Bodyweight_Walking_Lunge/1.jpg'] },
      { name: 'Seated Calf Raise',          sets: '4 × 12–15',      muscle: 'Calves',     imgs: ['Seated_Calf_Raise/0.jpg','Seated_Calf_Raise/1.jpg'] },
    ]
  },
  SUN: null,
};

const REST_NOTES = {
  WED: 'Non-negotiable. Mon + Tue are back-to-back strength days — your CNS needs this.',
  SUN: 'Full reset. Prioritise sleep, a big meal, and zero gym guilt.'
};

const todayIdx = new Date().getDay();
const todayKey = DAYS[todayIdx];
let selected = todayKey;

// Date label
const now = new Date();
document.getElementById('date-lbl').textContent =
  now.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' });

function chipText(key) {
  const d = SPLIT[key];
  if (!d) return 'Rest day';
  return d.label.split('—')[0].trim();
}
document.getElementById('today-chip').textContent = chipText(todayKey);

function renderSwitcher() {
  const el = document.getElementById('switcher');
  el.innerHTML = '';
  ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(d => {
    const btn = document.createElement('button');
    const isToday = d === todayKey;
    const isRest = !SPLIT[d];
    const isActive = d === selected;
    btn.className = 'day-btn'
      + (isActive ? ' active' : '')
      + (isRest ? ' rest-day' : '')
      + (isToday ? ' today' : '');
    btn.innerHTML = `${d}<span class="dot"></span>`;
    btn.onclick = () => { selected = d; renderSwitcher(); renderContent(); };
    el.appendChild(btn);
    if (isActive) {
      setTimeout(() => btn.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' }), 60);
    }
  });
}

function loadImg(imgEl, urls, idx) {
  if (idx >= urls.length) return;
  imgEl.src = BASE + urls[idx];
  imgEl.onload = () => imgEl.classList.add('show');
  imgEl.onerror = () => loadImg(imgEl, urls, idx + 1);
}

function renderContent() {
  const el = document.getElementById('content');
  const day = SPLIT[selected];

  if (!day) {
    el.innerHTML = `
      <div class="rest-screen">
        <div class="rest-icon">🌙</div>
        <div class="rest-title">Rest day</div>
        <div class="rest-sub">Recovery is where adaptation actually happens.</div>
        <div class="rest-note">${REST_NOTES[selected] || 'Rest and recover.'}</div>
      </div>`;
    return;
  }

  const bc = day.type === 'strength' ? 'b-strength' : 'b-hyp';
  const bl = day.type === 'strength' ? 'Strength' : 'Hypertrophy';

  const cards = day.exercises.map((ex, i) => `
    <div class="card">
      <div class="img-wrap" id="wrap-${selected}-${i}">
        <div class="placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 6.5h11M12 6.5V17M8 17h8"/><circle cx="12" cy="12" r="10"/>
          </svg>
        </div>
        <img alt="${ex.name}" data-idx="${i}" data-day="${selected}" />
      </div>
      <div class="card-body">
        <div class="card-name">${ex.name}</div>
        <div class="card-foot">
          <span class="card-sets">${ex.sets}</span>
          <span class="card-muscle">${ex.muscle}</span>
        </div>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="session-meta">
      <span class="session-name">${day.label}</span>
      <span class="type-badge ${bc}">${bl}</span>
    </div>
    <div class="ex-count">${day.exercises.length} exercises</div>
    <div class="grid">${cards}</div>`;

  // Load images after render
  day.exercises.forEach((ex, i) => {
    const img = el.querySelector(`img[data-idx="${i}"][data-day="${selected}"]`);
    if (img) loadImg(img, ex.imgs, 0);
  });
}

renderSwitcher();
renderContent();
</script>
</body>
</html>
