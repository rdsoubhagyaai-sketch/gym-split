<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Gym Split</title>
<style>
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;
    --border:rgba(255,255,255,0.07);--text:#f0f0f0;
    --text2:#777;--text3:#444;--accent:#c8f060;
    --strength:#60a5fa;--hyp:#86efac;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}
  .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:48px 18px 0;border-bottom:0.5px solid var(--border)}
  .header-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
  .app-title{font-size:24px;font-weight:700;letter-spacing:-0.5px}
  .app-date{font-size:12px;color:var(--text2);margin-top:3px}
  .today-chip{font-size:11px;font-weight:600;color:var(--accent);background:rgba(200,240,96,0.1);padding:4px 10px;border-radius:20px;white-space:nowrap}
  .switcher{display:flex;gap:6px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 18px 14px;margin:0 -18px}
  .switcher::-webkit-scrollbar{display:none}
  .day-btn{scroll-snap-align:start;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;min-width:52px;letter-spacing:0.03em}
  .day-btn .dot{width:4px;height:4px;border-radius:50%;background:transparent}
  .day-btn.today .dot{background:var(--accent)}
  .day-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .day-btn.active .dot{background:var(--bg)}
  .day-btn.rest-day{opacity:0.38}
  .content{padding:18px 16px 100px}
  .session-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .session-name{font-size:19px;font-weight:700;letter-spacing:-0.3px}
  .type-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase}
  .b-strength{background:rgba(96,165,250,0.12);color:var(--strength)}
  .b-hyp{background:rgba(134,239,172,0.12);color:var(--hyp)}
  .ex-count{font-size:12px;color:var(--text3);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  .card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden}
  .card:active{opacity:0.85}
  .img-wrap{width:100%;aspect-ratio:16/9;background:var(--surface2);position:relative;overflow:hidden}
  .img-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.4s;position:absolute;top:0;left:0;z-index:1}
  .img-wrap img.show{opacity:1}
  .gif-tag{position:absolute;top:8px;right:8px;z-index:2;font-size:9px;font-weight:700;background:var(--accent);color:#000;padding:2px 6px;border-radius:4px;opacity:0;transition:opacity 0.3s}
  .gif-tag.show{opacity:1}
  .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0}
  .placeholder svg{opacity:0.12}
  .card-body{padding:11px 13px 13px}
  .card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:8px}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:4px}
  .card-sets{font-size:12px;color:var(--accent);font-weight:700}
  .card-muscle{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:20px;white-space:nowrap}
  .rest-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;gap:10px;padding:2rem}
  .rest-icon{font-size:48px;margin-bottom:6px}
  .rest-title{font-size:22px;font-weight:700}
  .rest-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:270px}
  .rest-note{margin-top:14px;font-size:12px;color:var(--text3);border:0.5px solid var(--border);padding:10px 16px;border-radius:var(--radius-sm);max-width:290px;line-height:1.5}
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div>
      <div class="app-title">My Gym Split</div>
      <div class="app-date" id="date-lbl"></div>
    </div>
    <div class="today-chip" id="today-chip"></div>
  </div>
  <div class="switcher" id="switcher"></div>
</div>
<div class="content" id="content"></div>
<script>
const GIF = 'https://static.exercisedb.dev/media/';
const FB  = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

const SPLIT = {
  MON:{label:'Upper — Strength',type:'strength',exercises:[
    {name:'Barbell Bench Press',        sets:'4 × 4–6',        muscle:'Chest',      gif:GIF+'EIeI8Vf.gif', fb:FB+'Barbell_Bench_Press_-_Medium_Grip/0.jpg'},
    {name:'Weighted Pull-ups / BB Row', sets:'4 × 4–6',        muscle:'Back',       gif:GIF+'lBDjFxJ.gif', fb:FB+'Pullups/0.jpg'},
    {name:'Overhead Press',             sets:'3 × 5–7',        muscle:'Shoulders',  gif:GIF+'A6wtbuL.gif', fb:FB+'Barbell_Shoulder_Press/0.jpg'},
    {name:'Dips',                       sets:'3 × 6–8',        muscle:'Triceps',    gif:GIF+'J60bN17.gif', fb:FB+'Dips_-_Triceps_Version/0.jpg'},
    {name:'Chin-ups',                   sets:'3 × 6–8',        muscle:'Biceps',     gif:GIF+'T2mxWqc.gif', fb:FB+'Chin-Up/0.jpg'},
    {name:'Face Pulls',                 sets:'3 × 10–12',      muscle:'Rear Delts', gif:GIF+'G61cXLk.gif', fb:FB+'Face_Pull/0.jpg'},
  ]},
  TUE:{label:'Lower — Strength',type:'strength',exercises:[
    {name:'Barbell Squat',              sets:'4 × 4–6',        muscle:'Quads',      gif:GIF+'EIeI8Vf.gif', fb:FB+'Barbell_Full_Squat/0.jpg'},
    {name:'Romanian Deadlift',          sets:'4 × 5–7',        muscle:'Hamstrings', gif:GIF+'wQ2c4XD.gif', fb:FB+'Romanian_Deadlift/0.jpg'},
    {name:'Leg Press',                  sets:'3 × 6–8',        muscle:'Quads',      gif:GIF+'yn2lLSI.gif', fb:FB+'Leg_Press/0.jpg'},
    {name:'Standing Calf Raise',        sets:'4 × 8–10',       muscle:'Calves',     gif:GIF+'6HiHHe0.gif', fb:FB+'Calf_Press_On_The_Leg_Press_Machine/0.jpg'},
    {name:'Plank',                      sets:'3 × 45–60 sec',  muscle:'Core',       gif:GIF+'VBAWRPG.gif', fb:FB+'Plank/0.jpg'},
  ]},
  WED:null,
  THU:{label:'Push — Hypertrophy',type:'hypertrophy',exercises:[
    {name:'Incline Dumbbell Press',     sets:'4 × 8–10',       muscle:'Chest',      gif:GIF+'ns0SIbU.gif', fb:FB+'Incline_Dumbbell_Press/0.jpg'},
    {name:'Machine Bench / Flat DB',    sets:'3 × 10–12',      muscle:'Chest',      gif:GIF+'EIeI8Vf.gif', fb:FB+'Barbell_Bench_Press_-_Medium_Grip/0.jpg'},
    {name:'Lateral Raise',              sets:'4 × 12–15',      muscle:'Shoulders',  gif:GIF+'DsgkuIt.gif', fb:FB+'Seated_Side_Lateral_Raise/0.jpg'},
    {name:'Overhead Triceps Extension', sets:'3 × 10–12',      muscle:'Triceps',    gif:GIF+'2IxROQ1.gif', fb:FB+'Cable_Rope_Overhead_Triceps_Extension/0.jpg'},
    {name:'Triceps Pushdown',           sets:'3 × 12–15',      muscle:'Triceps',    gif:GIF+'gAwDzB3.gif', fb:FB+'Triceps_Pushdown/0.jpg'},
    {name:'Pec Fly',                    sets:'3 × 12–15',      muscle:'Chest',      gif:GIF+'w4dLzSx.gif', fb:FB+'Cable_Crossover/0.jpg'},
  ]},
  FRI:{label:'Pull — Hypertrophy',type:'hypertrophy',exercises:[
    {name:'Lat Pulldown',               sets:'4 × 10–12',      muscle:'Back',       gif:GIF+'rkg41Fb.gif', fb:FB+'Close-Grip_Front_Lat_Pulldown/0.jpg'},
    {name:'Barbell / DB Row',           sets:'4 × 8–10',       muscle:'Back',       gif:GIF+'eZyBC3j.gif', fb:FB+'Bent_Over_Barbell_Row/0.jpg'},
    {name:'Seated Cable Row',           sets:'3 × 10–12',      muscle:'Back',       gif:GIF+'fUBheHs.gif', fb:FB+'Seated_Cable_Rows/0.jpg'},
    {name:'Face Pulls',                 sets:'3 × 15–20',      muscle:'Rear Delts', gif:GIF+'wqNPGCg.gif', fb:FB+'Face_Pull/0.jpg'},
    {name:'Barbell Curl',               sets:'4 × 10–12',      muscle:'Biceps',     gif:GIF+'25GPyDY.gif', fb:FB+'Barbell_Curl/0.jpg'},
    {name:'Hammer Curl',                sets:'3 × 12–15',      muscle:'Biceps',     gif:GIF+'GNhAeJ0.gif', fb:FB+'Alternate_Hammer_Curl/0.jpg'},
    {name:'Reverse Fly',                sets:'3 × 15–20',      muscle:'Rear Delts', gif:GIF+'prbWx1D.gif', fb:FB+'Reverse_Flyes/0.jpg'},
  ]},
  SAT:{label:'Legs — Hypertrophy',type:'hypertrophy',exercises:[
    {name:'Front Squat / Goblet Squat', sets:'4 × 8–10',       muscle:'Quads',      gif:GIF+'ZA8b5hc.gif', fb:FB+'Goblet_Squat/0.jpg'},
    {name:'Leg Curl',                   sets:'4 × 10–12',      muscle:'Hamstrings', gif:GIF+'17lJ1kr.gif', fb:FB+'Lying_Leg_Curls/0.jpg'},
    {name:'Leg Extension',              sets:'3 × 12–15',      muscle:'Quads',      gif:GIF+'my33uHU.gif', fb:FB+'Leg_Extensions/0.jpg'},
    {name:'Hip Thrust / Glute Bridge',  sets:'4 × 10–12',      muscle:'Glutes',     gif:GIF+'Pjbc0Kt.gif', fb:FB+'Barbell_Hip_Thrust/0.jpg'},
    {name:'Walking Lunge',              sets:'3 × 12–16 steps', muscle:'Quads',     gif:GIF+'IZVHb27.gif', fb:FB+'Bodyweight_Walking_Lunge/0.jpg'},
    {name:'Seated Calf Raise',          sets:'4 × 12–15',      muscle:'Calves',     gif:GIF+'bOOdeyc.gif', fb:FB+'Seated_Calf_Raise/0.jpg'},
  ]},
  SUN:null,
};

const REST_NOTES={
  WED:'Non-negotiable. Mon + Tue are back-to-back strength days — your CNS needs this.',
  SUN:'Full reset. Prioritise sleep, a big meal, and zero gym guilt.'
};

const todayIdx=new Date().getDay();
const todayKey=DAYS[todayIdx];
let selected=todayKey;

document.getElementById('date-lbl').textContent=
  new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});

function chipText(k){const d=SPLIT[k];if(!d)return'Rest day';return d.label.split('—')[0].trim()}
document.getElementById('today-chip').textContent=chipText(todayKey);

function renderSwitcher(){
  const el=document.getElementById('switcher');
  el.innerHTML='';
  ['MON','TUE','WED','THU','FRI','SAT','SUN'].forEach(d=>{
    const btn=document.createElement('button');
    btn.className='day-btn'+(d===selected?' active':'')+(!SPLIT[d]?' rest-day':'')+(d===todayKey?' today':'');
    btn.innerHTML=`${d}<span class="dot"></span>`;
    btn.onclick=()=>{selected=d;renderSwitcher();renderContent()};
    el.appendChild(btn);
    if(d===selected) setTimeout(()=>btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),60);
  });
}

function loadImg(img,tag,gif,fb){
  img.src=gif;
  img.onload=()=>{img.classList.add('show');if(tag)tag.classList.add('show')};
  img.onerror=()=>{img.src=fb;img.onload=()=>img.classList.add('show');img.onerror=null};
}

function renderContent(){
  const el=document.getElementById('content');
  const day=SPLIT[selected];
  if(!day){
    el.innerHTML=`<div class="rest-screen">
      <div class="rest-icon">🌙</div>
      <div class="rest-title">Rest day</div>
      <div class="rest-sub">Recovery is where adaptation actually happens.</div>
      <div class="rest-note">${REST_NOTES[selected]||'Rest and recover.'}</div>
    </div>`;
    return;
  }
  const bc=day.type==='strength'?'b-strength':'b-hyp';
  const bl=day.type==='strength'?'Strength':'Hypertrophy';
  el.innerHTML=`
    <div class="session-meta">
      <span class="session-name">${day.label}</span>
      <span class="type-badge ${bc}">${bl}</span>
    </div>
    <div class="ex-count">${day.exercises.length} exercises</div>
    <div class="grid">${day.exercises.map((ex,i)=>`
      <div class="card">
        <div class="img-wrap">
          <div class="placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M12 6.5V17M8 17h8"/><circle cx="12" cy="12" r="10"/></svg></div>
          <span class="gif-tag" id="tag-${i}">GIF</span>
          <img id="img-${i}" alt="${ex.name}"/>
        </div>
        <div class="card-body">
          <div class="card-name">${ex.name}</div>
          <div class="card-foot">
            <span class="card-sets">${ex.sets}</span>
            <span class="card-muscle">${ex.muscle}</span>
          </div>
        </div>
      </div>`).join('')}
    </div>`;

  day.exercises.forEach((ex,i)=>{
    const img=document.getElementById('img-'+i);
    const tag=document.getElementById('tag-'+i);
    if(img) loadImg(img,tag,ex.gif,ex.fb);
  });
}

renderSwitcher();
renderContent();
</script>
</body>
</html>
